services:
  # --- MySQL 8.0 数据库服务 ---
  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: crypto_tips          # 与 config.yaml DSN 保持一致
      MYSQL_USER: crypto_user              # 与 config.yaml DSN 保持一致
      MYSQL_PASSWORD: crypto_pass          # 与 config.yaml DSN 保持一致
    ports:
      - "3306:3306"
    volumes:
      # WSL2 环境下 MySQL 必须用 named volume（bind mount 不支持 chmod，SSL 证书初始化会失败）
      - mysql_data:/var/lib/mysql
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "crypto_user", "-pcrypto_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis 7.0 缓存服务 ---
  redis:
    image: redis:7.0-alpine
    container_name: redis-dev
    restart: always
    command: redis-server --appendonly yes  # 开启 AOF 持久化，无密码（与 config.yaml 一致）
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data                  # Redis 无权限问题，bind mount 即可
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dev-network:
    driver: bridge

volumes:
  # Named volume：由 Docker 管理，存储在 Docker VM 内 ext4 文件系统，完整支持 Linux 权限
  mysql_data:
